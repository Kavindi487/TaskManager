spring.application.name=backend
server.port=${SERVER_PORT:8080}

# Add zeroDateTimeBehavior=CONVERT_TO_NULL to fix "Zero date value prohibited" error
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/task_manager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&zeroDateTimeBehavior=CONVERT_TO_NULL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456789}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Run data migration SQL on startup to fix any zero-date rows
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

app.jwt.secret=${APP_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
