<div class="modal-backdrop" (click)="cancel.emit()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <span class="breadcrumb">WORKSPACE / TASK EDITOR</span>
      <button class="close-btn" (click)="cancel.emit()">✕</button>
    </div>

    <h2 class="modal-title">{{ isEdit ? 'Edit Task' : 'Create New Task' }}</h2>
    <p class="modal-subtitle">Define the scope and priority of your next milestone.</p>

    <div class="form-group">
      <label class="form-label">Title <span class="required">*</span></label>
      <input
        class="form-input"
        [class.error]="titleError"
        [(ngModel)]="title"
        (input)="titleError = false"
        placeholder="What needs to be done?"
        maxlength="150" />
      <span class="error-msg" *ngIf="titleError">Title is required</span>
    </div>

    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-select" [(ngModel)]="status">
        <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea
        class="form-textarea"
        [(ngModel)]="description"
        placeholder="Add context, links, or specific requirements..."
        rows="5"
        maxlength="1000">
      </textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="cancel.emit()">Cancel</button>
      <button class="btn-save" (click)="submit()">Save Task</button>
    </div>

    <div class="modal-footer">
      <span>👁 Visible to Project Team</span>
      <span>Draft auto-saved</span>
    </div>
  </div>
</div>
