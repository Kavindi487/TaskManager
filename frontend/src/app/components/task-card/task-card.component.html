<div class="task-card">
  <div class="task-check">
    <div class="checkbox" [class.checked]="isDone">
      <span *ngIf="isDone">✓</span>
    </div>
  </div>

  <div class="task-details">
    <p class="task-title" [class.done-title]="isDone">{{ task.title }}</p>
    <p class="task-desc">{{ task.description }}</p>
  </div>

  <div class="task-status">
    <span class="status-chip" [ngClass]="statusClass">
      <span *ngIf="isDone">✓ </span>
      {{ task.status }}
    </span>
  </div>

  <div class="task-date">
    {{ formatDate(task.createdAt) }}
  </div>

  <div class="task-actions">
    <button class="action-btn edit-btn" (click)="edit.emit(task)" title="Edit">✎</button>
    <button class="action-btn delete-btn" (click)="delete.emit(task)" title="Delete">🗑</button>
  </div>
</div>
