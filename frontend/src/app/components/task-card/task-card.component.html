<div class="task-card">
  <div class="task-details">
    <div class="task-title-row">
      <p class="task-title" [class.done-title]="isDone">{{ task.title }}</p>
    </div>
    <p class="task-desc">{{ task.description || 'No description provided.' }}</p>
  </div>

  <div class="task-status">
    <span class="status-chip" [ngClass]="statusClass">
      {{ displayStatus }}
    </span>
  </div>

  <div class="task-date">
    {{ formatDate(task.createdAt) }}
  </div>

  <div class="task-actions">
    <button class="action-btn edit-btn" (click)="edit.emit(task)" title="Edit">Edit</button>
    <button class="action-btn delete-btn" (click)="delete.emit(task)" title="Delete">Delete</button>
  </div>
</div>
